<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <script>
        let data = [];
        let undoStack = [];
        let redoStack = [];

        function create() {
            const value = prompt("Enter new entry:");
            if (value) {
                undoStack.push([...data]);
                data.push(value);
                render();
            }
        }

        function save() {
            alert("Data saved: " + data.join(", "));
        }

        function edit() {
            const index = prompt("Enter index to edit:");
            if (index >= 0 && index < data.length) {
                const newValue = prompt("Enter new value:", data[index]);
                if (newValue) {
                    undoStack.push([...data]);
                    data[index] = newValue;
                    render();
                }
            } else {
                alert("Invalid index");
            }
        }

        function remove() {
            const index = prompt("Enter index to delete:");
            if (index >= 0 && index < data.length) {
                undoStack.push([...data]);
                data.splice(index, 1);
                render();
            } else {
                alert("Invalid index");
            }
        }

        function refresh() {
            render();
        }

        function undo() {
            if (undoStack.length > 0) {
                redoStack.push([...data]);
                data = undoStack.pop();
                render();
            } else {
                alert("Nothing to undo");
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                undoStack.push([...data]);
                data = redoStack.pop();
                render();
            } else {
                alert("Nothing to redo");
            }
        }

        function render() {
            document.getElementById("data").innerText = "Data: " + data.join(", ");
        }
    </script>
</head>
<body>
    <h1>School Management System</h1>
    <div>
        <button onclick="create()">Create</button>
        <button onclick="save()">Save</button>
        <button onclick="edit()">Edit</button>
        <button onclick="remove()">Delete</button>
        <button onclick="refresh()">Refresh</button>
        <button onclick="undo()">Undo</button>
        <button onclick="redo()">Redo</button>
    </div>
    <div id="data">Data: </div>
</body>
</html>
